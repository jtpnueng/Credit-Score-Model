name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'
  AWS_REGION: us-east-1
  PROJECT_NAME: credit-score

jobs:
  # ── 1. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-train.txt
        pip install pytest pytest-cov flake8

    - name: Lint (syntax errors only)
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run tests
      run: pytest tests/ -v --cov=Src --cov-report=xml

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      continue-on-error: true
      with:
        file: ./coverage.xml

  # ── 2. Security Scan ─────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: pip install -r requirements.txt -r requirements-train.txt bandit

    - name: Bandit security scan
      run: bandit -r Src/ -f json -o bandit-report.json || echo "Issues found — see report"

    - uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: bandit-report.json

  # ── 3. Build Docker images → push to ECR ─────────────────────────────────────
  # Uses Docker BuildX + GitHub Actions cache so layers are reused across runs.
  # First run: ~15 min.  Every run after: ~2-3 min.
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      sagemaker_image_uri:  ${{ steps.meta-sagemaker.outputs.tags_csv }}
      api_image_uri:        ${{ steps.meta-api.outputs.tags_csv }}
      frontend_image_uri:   ${{ steps.meta-frontend.outputs.tags_csv }}

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Log in to Amazon ECR
      id: ecr-login
      uses: aws-actions/amazon-ecr-login@v2

    # Use docker driver — avoids pulling moby/buildkit from Docker Hub
    # (shared GHA runner IPs frequently hit Docker Hub rate limits)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker

    - name: Create ECR repos if they don't exist
      run: |
        aws ecr describe-repositories --repository-names ${{ env.PROJECT_NAME }}-sagemaker-model \
          --region ${{ env.AWS_REGION }} 2>/dev/null \
          || aws ecr create-repository \
               --repository-name ${{ env.PROJECT_NAME }}-sagemaker-model \
               --region ${{ env.AWS_REGION }}

        aws ecr describe-repositories --repository-names ${{ env.PROJECT_NAME }}-api \
          --region ${{ env.AWS_REGION }} 2>/dev/null \
          || aws ecr create-repository \
               --repository-name ${{ env.PROJECT_NAME }}-api \
               --region ${{ env.AWS_REGION }}

        aws ecr describe-repositories --repository-names ${{ env.PROJECT_NAME }}-frontend \
          --region ${{ env.AWS_REGION }} 2>/dev/null \
          || aws ecr create-repository \
               --repository-name ${{ env.PROJECT_NAME }}-frontend \
               --region ${{ env.AWS_REGION }}

    # ── SageMaker inference container ────────────────────────────────────────
    - name: Compute SageMaker image tags
      id: meta-sagemaker
      run: |
        REGISTRY=${{ steps.ecr-login.outputs.registry }}
        REPO=${{ env.PROJECT_NAME }}-sagemaker-model
        SHA_TAG=$REGISTRY/$REPO:${{ github.sha }}
        LATEST_TAG=$REGISTRY/$REPO:latest
        echo "tags_csv=$SHA_TAG" >> $GITHUB_OUTPUT
        echo "tags=$SHA_TAG,$LATEST_TAG" >> $GITHUB_OUTPUT

    - name: Build & push SageMaker image (cached)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.sagemaker
        push: true
        tags: ${{ steps.meta-sagemaker.outputs.tags }}
        # SageMaker only accepts Docker v2 manifest — NOT OCI image index.
        # provenance:false and a single platform prevents BuildX from creating
        # a multi-arch OCI manifest that SageMaker rejects.
        platforms: linux/amd64
        provenance: false
        sbom: false

    # ── FastAPI container ─────────────────────────────────────────────────────
    - name: Compute API image tags
      id: meta-api
      run: |
        REGISTRY=${{ steps.ecr-login.outputs.registry }}
        REPO=${{ env.PROJECT_NAME }}-api
        SHA_TAG=$REGISTRY/$REPO:${{ github.sha }}
        LATEST_TAG=$REGISTRY/$REPO:latest
        echo "tags_csv=$SHA_TAG" >> $GITHUB_OUTPUT
        echo "tags=$SHA_TAG,$LATEST_TAG" >> $GITHUB_OUTPUT

    - name: Build & push API image (cached)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.api
        push: true
        tags: ${{ steps.meta-api.outputs.tags }}

    # ── Streamlit frontend container ──────────────────────────────────────────
    - name: Compute frontend image tags
      id: meta-frontend
      run: |
        REGISTRY=${{ steps.ecr-login.outputs.registry }}
        REPO=${{ env.PROJECT_NAME }}-frontend
        SHA_TAG=$REGISTRY/$REPO:${{ github.sha }}
        LATEST_TAG=$REGISTRY/$REPO:latest
        echo "tags_csv=$SHA_TAG" >> $GITHUB_OUTPUT
        echo "tags=$SHA_TAG,$LATEST_TAG" >> $GITHUB_OUTPUT

    - name: Build & push frontend image (cached)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.frontend
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}

  # ── 4. Terraform → deploy SageMaker + ECS + API Gateway ──────────────────────
  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # Ensure S3 bucket exists for state — idempotent, safe to run every time
    - name: Bootstrap Terraform state bucket
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        BUCKET="credit-score-tf-state-${ACCOUNT_ID}"
        echo "TF_STATE_BUCKET=$BUCKET" >> $GITHUB_ENV

        aws s3api create-bucket --bucket "$BUCKET" --region ${{ env.AWS_REGION }} 2>/dev/null \
          || echo "Bucket already exists"
        aws s3api put-bucket-versioning \
          --bucket "$BUCKET" --versioning-configuration Status=Enabled
        aws s3api put-bucket-encryption --bucket "$BUCKET" \
          --server-side-encryption-configuration \
          '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

    - name: Terraform Init
      working-directory: terraform
      run: |
        terraform init \
          -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
          -backend-config="key=terraform.tfstate" \
          -backend-config="region=${{ env.AWS_REGION }}" \
          -backend-config="encrypt=true"

    # Pre-flight: delete resources that need to be recreated fresh.
    # SageMaker endpoint must be deleted so the new container image is used
    # (Terraform in-place update does NOT pull a new image — only recreation does).
    - name: Pre-flight resource cleanup
      run: |
        REGION=${{ env.AWS_REGION }}
        PROJECT=${{ env.PROJECT_NAME }}

        # ── SageMaker — delete endpoint first, then config, then model ────────
        echo "Deleting SageMaker endpoint (waits for full deletion)..."
        aws sagemaker delete-endpoint \
          --endpoint-name "${PROJECT}-endpoint" \
          --region $REGION 2>/dev/null && \
          aws sagemaker wait endpoint-deleted \
            --endpoint-name "${PROJECT}-endpoint" \
            --region $REGION 2>/dev/null && \
          echo "  endpoint deleted" || echo "  endpoint already gone"

        echo "Deleting SageMaker endpoint config..."
        aws sagemaker delete-endpoint-config \
          --endpoint-config-name "${PROJECT}-endpoint-config" \
          --region $REGION 2>/dev/null && echo "  deleted" || echo "  already gone"

        echo "Deleting SageMaker model..."
        aws sagemaker delete-model \
          --model-name "${PROJECT}-model" \
          --region $REGION 2>/dev/null && echo "  deleted" || echo "  already gone"

        # ── ECS — scale to 0 first so ENIs are released before SG deletion ─────
        echo "Scaling ECS services to 0, deleting, and waiting for drain..."
        CLUSTER="${PROJECT}-cluster"
        for SVC in "${PROJECT}-api-service" "${PROJECT}-frontend-service"; do
          aws ecs update-service --cluster "$CLUSTER" --service "$SVC" \
            --desired-count 0 --region $REGION 2>/dev/null && echo "  scaled $SVC to 0" || echo "  $SVC not found"
        done
        sleep 15
        for SVC in "${PROJECT}-api-service" "${PROJECT}-frontend-service"; do
          aws ecs delete-service --cluster "$CLUSTER" --service "$SVC" \
            --region $REGION 2>/dev/null && echo "  deleted $SVC" || echo "  $SVC already gone"
        done
        echo "Waiting for ECS services to become inactive..."
        for SVC in "${PROJECT}-api-service" "${PROJECT}-frontend-service"; do
          aws ecs wait services-inactive \
            --cluster "$CLUSTER" --services "$SVC" \
            --region $REGION 2>/dev/null && echo "  $SVC inactive" || echo "  $SVC wait skipped"
        done

        # ── ECS + networking ──────────────────────────────────────────────────
        echo "Deleting CloudWatch log groups..."
        for LG in "/ecs/${PROJECT}-api" "/ecs/${PROJECT}-frontend"; do
          aws logs delete-log-group --log-group-name "$LG" \
            --region $REGION 2>/dev/null && echo "  deleted $LG" || echo "  $LG already gone"
        done

        echo "Deleting ALB target groups..."
        for TG_NAME in "${PROJECT}-tg" "${PROJECT}-frontend-tg"; do
          TG_ARN=$(aws elbv2 describe-target-groups \
            --names "$TG_NAME" \
            --query "TargetGroups[0].TargetGroupArn" --output text \
            --region $REGION 2>/dev/null || echo "")
          [ -n "$TG_ARN" ] && [ "$TG_ARN" != "None" ] \
            && aws elbv2 delete-target-group --target-group-arn "$TG_ARN" \
               --region $REGION 2>/dev/null && echo "  deleted $TG_NAME" \
            || echo "  $TG_NAME already gone"
        done

        VPC_ID=$(aws ec2 describe-vpcs \
          --filters "Name=isDefault,Values=true" \
          --query "Vpcs[0].VpcId" --output text --region $REGION)

        echo "Deleting ECS security group..."
        ECS_SG=$(aws ec2 describe-security-groups \
          --filters "Name=group-name,Values=${PROJECT}-ecs-sg" \
                    "Name=vpc-id,Values=$VPC_ID" \
          --query "SecurityGroups[0].GroupId" --output text \
          --region $REGION 2>/dev/null || echo "")
        [ -n "$ECS_SG" ] && [ "$ECS_SG" != "None" ] \
          && aws ec2 delete-security-group --group-id "$ECS_SG" \
             --region $REGION 2>/dev/null && echo "  deleted $ECS_SG" \
          || echo "  already gone"

        echo "Deleting ALB security group..."
        ALB_SG=$(aws ec2 describe-security-groups \
          --filters "Name=group-name,Values=${PROJECT}-alb-sg" \
                    "Name=vpc-id,Values=$VPC_ID" \
          --query "SecurityGroups[0].GroupId" --output text \
          --region $REGION 2>/dev/null || echo "")
        [ -n "$ALB_SG" ] && [ "$ALB_SG" != "None" ] \
          && aws ec2 delete-security-group --group-id "$ALB_SG" \
             --region $REGION 2>/dev/null && echo "  deleted $ALB_SG" \
          || echo "  already gone"

    - name: Terraform Apply
      working-directory: terraform
      run: |
        terraform apply -auto-approve \
          -var="sagemaker_image_uri=${{ needs.build-and-push.outputs.sagemaker_image_uri }}" \
          -var="api_image_uri=${{ needs.build-and-push.outputs.api_image_uri }}" \
          -var="frontend_image_uri=${{ needs.build-and-push.outputs.frontend_image_uri }}"

    - name: Print live endpoints
      working-directory: terraform
      run: |
        echo ""
        echo "========================================"
        echo " API Gateway URL:"
        terraform output api_gateway_url
        echo ""
        echo " SageMaker endpoint:"
        terraform output sagemaker_endpoint_name
        echo ""
        echo " Frontend URL (Streamlit):"
        terraform output frontend_url
        echo "========================================"
