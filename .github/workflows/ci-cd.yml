name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.9'
  AWS_REGION: us-east-1
  PROJECT_NAME: credit-score

jobs:
  # ── 1. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8

    - name: Lint (syntax errors only)
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run tests
      run: pytest tests/ -v --cov=Src --cov-report=xml

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml

  # ── 2. Security Scan ─────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: pip install -r requirements.txt bandit

    - name: Bandit security scan
      run: bandit -r Src/ -f json -o bandit-report.json || echo "Issues found — see report"

    - uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: bandit-report.json

  # ── 3. Build Docker images → push to ECR ─────────────────────────────────────
  # Uses Docker BuildX + GitHub Actions cache so layers are reused across runs.
  # First run: ~15 min.  Every run after: ~2-3 min.
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      sagemaker_image_uri: ${{ steps.meta-sagemaker.outputs.tags_csv }}
      api_image_uri: ${{ steps.meta-api.outputs.tags_csv }}

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Log in to Amazon ECR
      id: ecr-login
      uses: aws-actions/amazon-ecr-login@v2

    # BuildX enables layer caching — single biggest time-saver
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Create ECR repos if they don't exist
      run: |
        aws ecr describe-repositories --repository-names ${{ env.PROJECT_NAME }}-sagemaker-model \
          --region ${{ env.AWS_REGION }} 2>/dev/null \
          || aws ecr create-repository \
               --repository-name ${{ env.PROJECT_NAME }}-sagemaker-model \
               --region ${{ env.AWS_REGION }}

        aws ecr describe-repositories --repository-names ${{ env.PROJECT_NAME }}-api \
          --region ${{ env.AWS_REGION }} 2>/dev/null \
          || aws ecr create-repository \
               --repository-name ${{ env.PROJECT_NAME }}-api \
               --region ${{ env.AWS_REGION }}

    # ── SageMaker inference container ────────────────────────────────────────
    - name: Compute SageMaker image tags
      id: meta-sagemaker
      run: |
        REGISTRY=${{ steps.ecr-login.outputs.registry }}
        REPO=${{ env.PROJECT_NAME }}-sagemaker-model
        SHA_TAG=$REGISTRY/$REPO:${{ github.sha }}
        LATEST_TAG=$REGISTRY/$REPO:latest
        echo "tags_csv=$SHA_TAG" >> $GITHUB_OUTPUT
        echo "tags=$SHA_TAG,$LATEST_TAG" >> $GITHUB_OUTPUT

    - name: Build & push SageMaker image (cached)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.sagemaker
        push: true
        tags: ${{ steps.meta-sagemaker.outputs.tags }}
        # SageMaker only accepts Docker v2 manifest — NOT OCI image index.
        # provenance:false and a single platform prevents BuildX from creating
        # a multi-arch OCI manifest that SageMaker rejects.
        platforms: linux/amd64
        provenance: false
        sbom: false
        cache-from: type=gha,scope=sagemaker
        cache-to:   type=gha,scope=sagemaker,mode=max

    # ── FastAPI container ─────────────────────────────────────────────────────
    - name: Compute API image tags
      id: meta-api
      run: |
        REGISTRY=${{ steps.ecr-login.outputs.registry }}
        REPO=${{ env.PROJECT_NAME }}-api
        SHA_TAG=$REGISTRY/$REPO:${{ github.sha }}
        LATEST_TAG=$REGISTRY/$REPO:latest
        echo "tags_csv=$SHA_TAG" >> $GITHUB_OUTPUT
        echo "tags=$SHA_TAG,$LATEST_TAG" >> $GITHUB_OUTPUT

    - name: Build & push API image (cached)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.api
        push: true
        tags: ${{ steps.meta-api.outputs.tags }}
        cache-from: type=gha,scope=api
        cache-to:   type=gha,scope=api,mode=max

  # ── 4. Terraform → deploy SageMaker + ECS + API Gateway ──────────────────────
  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # Ensure S3 bucket exists for state — idempotent, safe to run every time
    - name: Bootstrap Terraform state bucket
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        BUCKET="credit-score-tf-state-${ACCOUNT_ID}"
        echo "TF_STATE_BUCKET=$BUCKET" >> $GITHUB_ENV

        aws s3api create-bucket --bucket "$BUCKET" --region ${{ env.AWS_REGION }} 2>/dev/null \
          || echo "Bucket already exists"
        aws s3api put-bucket-versioning \
          --bucket "$BUCKET" --versioning-configuration Status=Enabled
        aws s3api put-bucket-encryption --bucket "$BUCKET" \
          --server-side-encryption-configuration \
          '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

    - name: Terraform Init
      working-directory: terraform
      run: |
        terraform init \
          -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
          -backend-config="key=terraform.tfstate" \
          -backend-config="region=${{ env.AWS_REGION }}" \
          -backend-config="encrypt=true"

    # Import the 3 resources that reliably survive the cleanup script
    # (CW log group + SGs have inter-dependencies that block deletion).
    # Each import is capped at 30s. Already-in-state = silently skipped.
    - name: Import surviving resources
      working-directory: terraform
      run: |
        VPC_ID=$(aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" \
          --query "Vpcs[0].VpcId" --output text --region ${{ env.AWS_REGION }})

        # CloudWatch log group
        aws logs describe-log-groups --log-group-name-prefix "/ecs/${{ env.PROJECT_NAME }}-api" \
          --query "logGroups[0].logGroupName" --output text 2>/dev/null | grep -q "api" \
          && (terraform state show aws_cloudwatch_log_group.api &>/dev/null \
              || timeout 30 terraform import aws_cloudwatch_log_group.api \
                 "/ecs/${{ env.PROJECT_NAME }}-api" 2>/dev/null || true) || true

        # ALB security group
        ALB_SG=$(aws ec2 describe-security-groups \
          --filters "Name=group-name,Values=${{ env.PROJECT_NAME }}-alb-sg" \
                    "Name=vpc-id,Values=$VPC_ID" \
          --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || echo "")
        [ -n "$ALB_SG" ] && [ "$ALB_SG" != "None" ] \
          && (terraform state show aws_security_group.alb &>/dev/null \
              || timeout 30 terraform import aws_security_group.alb "$ALB_SG" 2>/dev/null || true) || true

        # ECS security group
        ECS_SG=$(aws ec2 describe-security-groups \
          --filters "Name=group-name,Values=${{ env.PROJECT_NAME }}-ecs-sg" \
                    "Name=vpc-id,Values=$VPC_ID" \
          --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || echo "")
        [ -n "$ECS_SG" ] && [ "$ECS_SG" != "None" ] \
          && (terraform state show aws_security_group.ecs &>/dev/null \
              || timeout 30 terraform import aws_security_group.ecs "$ECS_SG" 2>/dev/null || true) || true

    - name: Terraform Apply
      working-directory: terraform
      run: |
        terraform apply -auto-approve \
          -var="sagemaker_image_uri=${{ needs.build-and-push.outputs.sagemaker_image_uri }}" \
          -var="api_image_uri=${{ needs.build-and-push.outputs.api_image_uri }}"

    - name: Print live endpoints
      working-directory: terraform
      run: |
        echo ""
        echo "========================================"
        echo " API Gateway URL:"
        terraform output api_gateway_url
        echo ""
        echo " SageMaker endpoint:"
        terraform output sagemaker_endpoint_name
        echo "========================================"
